# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
format = "$directory$git_branch$git_commit$git_state$git_metrics$git_status$line_break$character"
# right_format = "$lua$nodejs$php$pixi$python$rlang$ruby$rust$scala$swift$xmake$zig"

[character]
success_symbol = '[➜](bold green)'

[package]
disabled = true
symbol = "󰏗 "

[aws]
disabled = true
symbol = " "

[directory]
read_only = " 󰌾"

[docker_context]
symbol = " "

[git_branch]
symbol = " "
style = "bold red"
format = '[$symbol$branch]($style) '

[git_commit]
tag_symbol = '  '

[git_status]
disabled = true

[lua]
symbol = " "
format = "[$symbol$version]($style) "

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "

[php]
symbol = " "
format = "[$symbol$version]($style) "

[pixi]
symbol = "󰏗 "
format = "[$symbol$version]($style) "

[python]
symbol = " "
format = "[$symbol$version]($style) "

[rlang]
symbol = "󰟔 "
format = "[$symbol$version]($style) "

[ruby]
symbol = " "
format = "[$symbol$version]($style) "

[rust]
symbol = "󱘗 "
format = "[$symbol$version]($style) "

[scala]
symbol = " "
format = "[$symbol$version]($style) "

[status]
symbol = " "

[swift]
symbol = " "
format = "[$symbol$version]($style) "

[xmake]
symbol = " "
format = "[$symbol$version]($style) "

[zig]
symbol = " "
format = "[$symbol$version]($style) "

